name: CI Workflow
on: [push]
jobs:
  build:
    name: checkout 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        name: Checkout code
      - run: echo "Hello World"
        name: Echo greeting
      - run: ls -la
        name: List files
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Grant execute permission for gradlew
        run: |
          chmod +x gradlew
          ./gradlew build
          ./gradlew bootJar
          find . -name "*.jar"
          
