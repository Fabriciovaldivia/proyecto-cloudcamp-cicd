name: CI Workflow
on: [push]
jobs:
  build:
    name: checkout 
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        name: Checkout code
      - run: echo "Hello World"
        name: Echo greeting
      - run: ls -la
        name: List files
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Grant execute permission for gradlew
        run: |
          chmod +x gradlew
          ./gradlew build
          ./gradlew bootJar
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/fabriciovaldivia/proyecto-cloudcamp-cicd .
      - name: Login to github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Docker image
        run: |
          docker push ghcr.io/fabriciovaldivia/proyecto-cloudcamp-cicd

  secrets-prod:
    name: "secrets-prod"
    runs-on: ubuntu-latest
    environment: github.ref_name == 'main' && 'prod' || 'dev'
    env:
      target_environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Create secrets.txt
        run: |
          echo "environment: ${{ env.target_environment }}"
          echo "${{ secrets.DBUSERNAME }}" >> secrets.txt
          echo "${{ secrets.DBPASSWORD }}" >> secrets.txt
          echo "${{ secrets.SONARTOKEN }}" >> secrets.txt
      - name: upload secrets
        uses: actions/upload-artifact@v7
        with:
          name: ${{ format('secrets-{0}', github.ref_name == 'main' && 'prod' || 'dev') }}
          path: secrets.txt